<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ログイン - おこづかいアプリ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app-container login-container">
    
    <h1 style="font-size: 24px; font-weight: bold; margin: 0 0 25px 0; text-align: center;">おなまえ入力</h1>

    <div class="login-group">
      <input type="text" id="userNameInput" class="login-input" placeholder="ここにおなまえを書いてね">
      
      <div style="height: 10px;"></div>
      <img src="/img/cat.png" class="login-cat-icon" alt="ねこ">
      <button class="btn login-btn" id="loginButton">
        🐾けってい🐾
      </button>
    </div>

  </div>

  <script type="module" src="login.js"></script>

</body>
</html>
