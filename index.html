<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>おこづかいアプリ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="user-name-box" id="logoutTrigger">
  おなまえ：<span id="displayUserName">@userName</span>
</div>

<div id="logoutModal" class="modal-overlay" style="display: none; z-index: 1200;">
  <div class="modal-content" style="width: 280px; text-align: center;">
    <p style="font-size: 18px; font-weight: bold; margin: 10px 0;">ログアウトしますか？</p>
    <div class="modal-footer" style="justify-content: center; gap: 20px; margin-top: 10px;">
      <button id="logoutConfirmBtn" class="action-btn" style="border-color: red; color: red;">はい</button>
      <button id="logoutCancelBtn" class="action-btn">いいえ</button>
    </div>
  </div>
</div>

  <div class="app-container">
    <div class="balance-box">
      <p class="balance-title">のこり</p>
      <p class="balance-money" id="balanceMoney">0円</p>
    </div>

    <button class="btn use-btn" id="useButton">
      つかう
    </button>

    <button class="btn get-btn" id="getButton">
      もらう
    </button>

    <button class="btn history-btn" id="historyOpenBtn">りれき</button>

    <div id="historyModal" class="modal-overlay" style="display: none;">
      <div class="modal-content" style="width: 340px; max-height: 80vh; display: flex; flex-direction: column;">
        
        <div class="modal-header" style="justify-content: center; align-items: center; gap: 10px;">
          <span style="font-size: 24px;">いつ</span>
          <select id="monthSelector" style="border: 4px solid #000; padding: 5px 20px; font-size: 22px; font-weight: bold; background: white; font-family: inherit; cursor: pointer;"></select>
        </div>

        <div class="history-area" id="historyArea" style="flex-grow: 1; margin-top: 20px;">
        </div>

        <div class="modal-footer" style="margin-top: 15px;">
          <button id="historyCloseBtn" class="action-btn">閉じる</button>
        </div>
      </div>
    </div>

    <div id="deleteModal" class="modal-overlay" style="display: none; z-index: 1100;">
      <div class="modal-content" style="width: 280px; text-align: center;">
        <p style="font-size: 18px; font-weight: bold; margin: 10px 0;">この履歴を削除しますか？</p>
        <div class="modal-footer" style="justify-content: center; gap: 20px; margin-top: 10px;">
          <button id="deleteConfirmBtn" class="action-btn" style="border-color: red; color: red;">削除</button>
          <button id="deleteCancelBtn" class="action-btn">キャンセル</button>
        </div>
      </div>
    </div>

  </div>

  <div id="inputModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      
      <div class="modal-header">
        <div class="type-toggle">
          <button id="toggleUse" class="toggle-btn use-type">つかう</button>
          <button id="toggleGet" class="toggle-btn get-type">もらう</button>
        </div>
      </div>

      <div class="modal-body">
        <div class="input-group">
          <label>きんがく</label>
          <input type="number" id="inputMoney" min="1" inputmode="numeric">
          <span class="unit">円</span>
        </div>
        <div style="height: 15px;"></div>
        <div class="input-group">
          <label>メモ</label>
          <textarea id="inputMemo"></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button id="submitBtn" class="action-btn">決定</button>
        <button id="closeBtn" class="action-btn">閉じる</button>
      </div>

    </div>
  </div>
<script type="module" src="script.js"></script>

</body>
</html>
